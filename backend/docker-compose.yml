services:
  postgres:
    image: postgres:16
    container_name: campaign-management-postgres
    environment:
      POSTGRES_DB: campaign_management_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campaign_management_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campaign-management-network

  redis:
    image: redis:7-alpine
    container_name: campaign-management-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campaign-management-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

networks:
  campaign-management-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

